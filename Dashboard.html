const t = (key, lang) => {
  const parts = key.split('.');
  let n = COPY;
  for (const p of parts) n = n?.[p];
  if (!n) return key;
  return n[lang] || n.en || key;
};

const fmtIDR = (n, lang, opts = {}) => {
  const abs = Math.abs(n);
  const sep = lang === 'id' ? '.' : ',';
  const str = abs.toLocaleString('en-US').replace(/,/g, sep);
  const sign = opts.signed ? (n > 0 ? '+' : n < 0 ? '−' : '') : '';
  return sign + 'Rp ' + str;
};

const fmtIDRShort = (n) => {
  const abs = Math.abs(n);
  if (abs >= 1000000) return (abs / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (abs >= 1000) return (abs / 1000).toFixed(0) + 'K';
  return abs.toString();
};

/* ============================================================ */
/* TWEAKS HOOK                                                   */
/* ============================================================ */
function useTweaks(defaults) {
  const [state, setState] = useState(defaults);
  const setTweak = (k, v) => {
    setState(prev => {
      const next = typeof k === 'object' ? { ...prev, ...k } : { ...prev, [k]: v };
      window.parent.postMessage({ type:'__edit_mode_set_keys', edits: next }, '*');
      return next;
    });
  };
  return [state, setTweak];
}

/* ============================================================ */
/* DONUT CHART                                                   */
/* ============================================================ */
function DonutCard({ lang, cats, total }) {
  const [hover, setHover] = useState(null);
  const R = 56, C = 2 * Math.PI * R;
  let offset = 0;
  const segs = cats.map((c, i) => {
    const len = (c.val / total) * C;
    const seg = { ...c, len, offset, idx: i };
    offset += len;
    return seg;
  });
  const active = hover !== null ? cats[hover] : null;
  return (
    <Card>
      <CardHeader title={t('charts.byCategory', lang)} sub={t('charts.thisMonth', lang)} />
      <div style={{ display:'flex', alignItems:'center', gap:24, padding:'12px 4px 4px' }}>
        <div style={{ position:'relative', width:160, height:160, flexShrink:0 }}>
          <svg width="160" height="160" viewBox="0 0 160 160">
            <circle cx="80" cy="80" r={R} fill="none" stroke="var(--bg-soft)" strokeWidth="18"/>
            {segs.map(s => (
              <circle key={s.key} cx="80" cy="80" r={R} fill="none"
                stroke={CAT_COLORS[s.key].dot} strokeWidth="18"
                strokeDasharray={`${s.len} ${C}`}
                strokeDashoffset={-s.offset}
                transform="rotate(-90 80 80)"
                className="donut-seg"
                style={{ animationDelay: `${s.idx*0.08}s`, cursor:'pointer', transition:'opacity 0.2s', opacity: hover !== null && hover !== s.idx ? 0.3 : 1 }}
                onMouseEnter={() => setHover(s.idx)}
                onMouseLeave={() => setHover(null)}
              />
            ))}
          </svg>
          <div style={{
            position:'absolute', inset:0, display:'flex', flexDirection:'column',
            alignItems:'center', justifyContent:'center', pointerEvents:'none'
          }}>
            <div style={{ fontSize:10, color:'var(--ink-4)', fontWeight:500, textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:2 }}>
              {active ? t('categoriesShort.' + active.key, lang) : (lang === 'id' ? 'Total' : 'Total')}
            </div>
            <div className="mono" style={{ fontSize:22, fontWeight:600, letterSpacing:'-0.01em' }}>
              {fmtIDRShort(active ? active.val : total)}
            </div>
            {active && (
              <div style={{ fontSize:10, color:'var(--ink-4)', marginTop:2 }}>
                {((active.val/total)*100).toFixed(1)}%
              </div>
            )}
          </div>
        </div>
        <div style={{ flex:1, display:'flex', flexDirection:'column', gap:8 }}>
          {cats.map((c, i) => (
            <div key={c.key}
              onMouseEnter={() => setHover(i)}
              onMouseLeave={() => setHover(null)}
              style={{
                display:'grid', gridTemplateColumns:'auto 1fr auto auto', gap:10, alignItems:'center',
                padding:'5px 6px', borderRadius:6, cursor:'pointer',
                background: hover === i ? 'var(--bg-soft)' : 'transparent',
                transition:'background 0.15s'
              }}>
              <span style={{ width:10, height:10, borderRadius:3, background:CAT_COLORS[c.key].dot }}/>
              <span style={{ fontSize:13, color:'var(--ink-2)' }}>{t('categories.' + c.key, lang)}</span>
              <span style={{ fontSize:11, color:'var(--ink-4)', minWidth:38, textAlign:'right' }}>
                {((c.val/total)*100).toFixed(0)}%
              </span>
              <span className="mono" style={{ fontSize:12, fontWeight:500, minWidth:60, textAlign:'right' }}>
                {fmtIDRShort(c.val)}
              </span>
            </div>
          ))}
        </div>
      </div>
    </Card>
  );
}

/* ============================================================ */
/* TREND CHART                                                   */
/* ============================================================ */
function TrendCard({ lang }) {
  const points = [42, 28, 36, 22, 38, 45, 31, 26, 48, 39, 52, 33, 42, 28, 35, 48, 78, 41, 36, 44, 52, 39, 47, 95, 62, 51, 38, 42, 51, 46];
  const [hoverIdx, setHoverIdx] = useState(null);
  const W = 700, H = 220, P = 16;
  const max = Math.max(...points);
  const min = 0;
  const xAt = i => P + (i / (points.length - 1)) * (W - 2*P);
  const yAt = v => H - P - 28 - ((v - min) / (max - min)) * (H - 2*P - 28);
  const path = points.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xAt(i).toFixed(1)} ${yAt(v).toFixed(1)}`).join(' ');
  const area = path + ` L ${xAt(points.length-1)} ${H-P-28} L ${xAt(0)} ${H-P-28} Z`;

  const avg = points.reduce((s,v) => s+v, 0) / points.length;
  const avgY = yAt(avg);

  const handleMove = (e) => {
    const svg = e.currentTarget;
    const rect = svg.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * W;
    const idx = Math.max(0, Math.min(points.length-1, Math.round(((x - P) / (W - 2*P)) * (points.length-1))));
    setHoverIdx(idx);
  };

  return (
    <Card>
      <CardHeader title={t('charts.dailyTrend', lang)} sub={t('charts.last30', lang)}
        actions={
          <div style={{ display:'flex', gap:6 }}>
            {[{k:'7d',l:'7D'},{k:'30d',l:'30D'},{k:'90d',l:'90D'}].map((s, i) => (
              <button key={s.k} style={{
                padding:'4px 10px', borderRadius:6, fontSize:11, fontWeight:500,
                background: i === 1 ? 'var(--bg-soft)' : 'transparent',
                color: i === 1 ? 'var(--ink)' : 'var(--ink-4)',
                border: i === 1 ? '1px solid var(--border)' : '1px solid transparent'
              }}>{s.l}</button>
            ))}
          </div>
        }
      />
      <div style={{ padding:'8px 4px 4px', position:'relative' }}>
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" height="220" preserveAspectRatio="none"
          style={{ display:'block', cursor:'crosshair' }}
          onMouseMove={handleMove}
          onMouseLeave={() => setHoverIdx(null)}
        >
          <defs>
            <linearGradient id="trendArea" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.25"/>
              <stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/>
            </linearGradient>
          </defs>

          {/* horizontal gridlines */}
          {[0, 0.25, 0.5, 0.75, 1].map((p, i) => {
            const y = P + p * (H - 2*P - 28);
            return <line key={i} x1={P} x2={W-P} y1={y} y2={y} stroke="var(--bg-soft)" strokeWidth="1"/>;
          })}

          {/* avg line */}
          <line x1={P} x2={W-P} y1={avgY} y2={avgY} stroke="var(--ink-5)" strokeDasharray="4 4" strokeWidth="1"/>
          <text x={W-P-4} y={avgY-6} textAnchor="end" fontSize="10" fill="var(--ink-4)" fontFamily="JetBrains Mono">
            avg {fmtIDRShort(Math.round(avg*1000))}
          </text>

          {/* area */}
          <path d={area} fill="url(#trendArea)"/>

          {/* line */}
          <path className="chart-line" d={path} stroke="var(--accent)" strokeWidth="2.4" fill="none" strokeLinecap="round" strokeLinejoin="round"/>

          {/* spike marker for anomalous day */}
          {points.map((v, i) => v > 70 && (
            <g key={'spike'+i}>
              <circle cx={xAt(i)} cy={yAt(v)} r="5" fill="#fff" stroke="var(--danger)" strokeWidth="2"/>
              <circle cx={xAt(i)} cy={yAt(v)} r="9" fill="none" stroke="var(--danger)" strokeWidth="1" opacity="0.4" className="pulse-dot"/>
            </g>
          ))}

          {/* hover */}
          {hoverIdx !== null && (
            <g>
              <line x1={xAt(hoverIdx)} x2={xAt(hoverIdx)} y1={P} y2={H-P-28}
                stroke="var(--ink-5)" strokeWidth="1" strokeDasharray="2 3"/>
              <circle cx={xAt(hoverIdx)} cy={yAt(points[hoverIdx])} r="4" fill="#fff" stroke="var(--accent)" strokeWidth="2"/>
            </g>
          )}

          {/* x labels */}
          {[0, 7, 14, 21, 29].map(i => (
            <text key={i} x={xAt(i)} y={H-8} textAnchor="middle" fontSize="10" fill="var(--ink-4)" fontFamily="JetBrains Mono">
              {i+1}
            </text>
          ))}
        </svg>
        {hoverIdx !== null && (
          <div style={{
            position:'absolute',
            left: `calc(${(xAt(hoverIdx) / W) * 100}% + ${hoverIdx > points.length/2 ? -110 : 12}px)`,
            top: `calc(${(yAt(points[hoverIdx]) / H) * 100}% - 8px)`,
            background:'var(--ink)', color:'#fff', padding:'8px 12px', borderRadius:8,
            fontSize:11, pointerEvents:'none', whiteSpace:'nowrap',
            boxShadow:'var(--shadow-md)', minWidth:120
          }}>
            <div style={{ fontSize:10, color:'rgba(255,255,255,0.6)', marginBottom:2 }}>
              {lang === 'id' ? `${hoverIdx+1} Mei 2026` : `May ${hoverIdx+1}, 2026`}
            </div>
            <div className="mono" style={{ fontWeight:600 }}>{fmtIDR(points[hoverIdx]*1000, lang)}</div>
          </div>
        )}
      </div>
    </Card>
  );
}

      <div style={{ maxHeight:520, overflow:'auto' }}>
        {txns.length === 0 ? (
          <div style={{ padding:'48px 18px', textAlign:'center' }}>
            <div style={{
              width:48, height:48, borderRadius:12, background:'var(--bg-soft)',
              display:'inline-flex', alignItems:'center', justifyContent:'center',
              color:'var(--ink-4)', marginBottom:12
            }}>
              <Icon name="list" size={20} />
            </div>
            <div style={{ fontSize:14, fontWeight:500, color:'var(--ink-2)', marginBottom:4 }}>{t('txns.empty', lang)}</div>
            <div style={{ fontSize:13, color:'var(--ink-4)' }}>{t('txns.emptySub', lang)}</div>
          </div>
        ) : (
          txns.slice(0, 12).map((tx, i) => (
            <div key={tx.id} style={{
              display:'grid', gridTemplateColumns:'auto 1fr auto auto', gap:14, alignItems:'center',
              padding:'12px 18px',
              borderBottom: i < Math.min(11, txns.length-1) ? '1px solid var(--border)' : 'none',
              transition:'background 0.15s', cursor:'pointer'
            }}
              onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-soft)'}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
            >
              <div style={{
                width:36, height:36, borderRadius:9,
                background: CAT_COLORS[tx.cat].bg,
                color: CAT_COLORS[tx.cat].c,
                display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0
              }}>
                <Icon name={CAT_ICON[tx.cat] || 'spark'} size={14} stroke={2.2} />
              </div>
              <div style={{ minWidth:0 }}>
                <div style={{ fontSize:13, fontWeight:500, color:'var(--ink)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                  {tx.desc[lang]}
                </div>
                <div style={{ fontSize:11, color:'var(--ink-4)', marginTop:2, display:'flex', alignItems:'center', gap:8 }}>
                  <span>{formatDate(tx.date, lang)}</span>
                  <span style={{ color:'var(--ink-5)' }}>·</span>
                  {tx.id === processingId ? (
                    <span style={{ display:'inline-flex', alignItems:'center', gap:4, color:'var(--accent-2)' }}>
                      <span style={{
                        width:10, height:10, border:'1.5px solid var(--accent)', borderTopColor:'transparent',
                        borderRadius:'50%', display:'inline-block', animation:'spin 0.8s linear infinite'
                      }}/>
                      {t('categorizing', lang)}
                    </span>
                  ) : (
                    <span>{t('categoriesShort.' + tx.cat, lang)}</span>
                  )}
                </div>
              </div>
              <CatBadge cat={tx.cat} lang={lang} />
              <span className="mono" style={{
                fontSize:14, fontWeight:600,
                color: tx.amt > 0 ? 'var(--accent-2)' : 'var(--ink)',
                minWidth:120, textAlign:'right'
              }}>
                {fmtIDR(tx.amt, lang, { signed:true })}
              </span>
            </div>
          ))
        )}
      </div>
    </Card>
  );
}

function CatBadge({ cat, lang }) {
  const c = CAT_COLORS[cat];
  return (
    <span style={{
      fontSize:10, fontWeight:500, padding:'3px 8px', borderRadius:5,
      color: c.c, background: c.bg, whiteSpace:'nowrap'
    }}>{t('categoriesShort.' + cat, lang)}</span>
  );
}

/* ============================================================ */
/* CARD                                                          */
/* ============================================================ */
function Card({ children, noPad, style }) {
  return (
    <div className="slide-up" style={{
      background:'#fff', border:'1px solid var(--border)', borderRadius:14,
      padding: noPad ? 0 : '16px 18px', ...style
    }}>
      {children}
    </div>
  );
}
function CardHeader({ title, sub, actions }) {
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:6 }}>
      <div>
        <div style={{ fontSize:13, fontWeight:600, color:'var(--ink)' }}>{title}</div>
        {sub && <div style={{ fontSize:11, color:'var(--ink-4)', marginTop:2 }}>{sub}</div>}
      </div>
      {actions}
    </div>
  );
}

/* ============================================================ */
/* ADD TRANSACTION MODAL                                         */
/* ============================================================ */
function AddTxnModal({ lang, open, onClose, onSave }) {
  const [type, setType] = useState('expense');
  const [amount, setAmount] = useState('');
  const [desc, setDesc] = useState('');
  const [date, setDate] = useState('2026-05-26');

  useEffect(() => {
    if (open) {
      setType('expense');
      setAmount('');
      setDesc('');
      setDate('2026-05-26');
    }
  }, [open]);

  if (!open) return null;
  const canSave = amount && desc;

  const submit = () => {
    if (!canSave) return;
    const n = parseInt(String(amount).replace(/[^\d]/g, ''), 10) || 0;
    onSave({ amount: type === 'expense' ? -n : n, desc, date });
  };

  return (
    <>
      <div style={{
        position:'fixed', inset:0, background:'rgba(9,9,11,0.5)', zIndex:90,
        animation:'backdropIn 0.2s ease-out'
      }} onClick={onClose}/>
      <div style={{
        position:'fixed', inset:0, zIndex:100, display:'flex', alignItems:'center', justifyContent:'center',
        padding:20, pointerEvents:'none'
      }}>
        <div style={{
          background:'#fff', borderRadius:16, width:'100%', maxWidth:460,
          boxShadow:'var(--shadow-lg)', pointerEvents:'auto',
          animation:'modalIn 0.25s ease-out',
          border:'1px solid var(--border)'
        }}>
          <div style={{ padding:'20px 24px 8px', display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
            <div>
              <h2 style={{ fontSize:18, fontWeight:600, margin:'0 0 4px', letterSpacing:'-0.015em' }}>{t('modal.title', lang)}</h2>
              <p style={{ fontSize:13, color:'var(--ink-4)', margin:0 }}>{t('modal.sub', lang)}</p>
            </div>
            <button onClick={onClose} style={{ color:'var(--ink-4)', padding:4 }}>
              <Icon name="x" size={16} />
            </button>
          </div>
          <div style={{ padding:'16px 24px', display:'flex', flexDirection:'column', gap:14 }}>
            {/* Type toggle */}
            <div>
              <Label>{t('modal.type', lang)}</Label>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, background:'var(--bg-soft)', padding:4, borderRadius:9 }}>
                {[
                  { k:'expense', label:t('modal.expense', lang), color:'var(--danger)' },
                  { k:'income',  label:t('modal.income', lang),  color:'var(--accent-2)' },
                ].map(opt => (
                  <button key={opt.k} onClick={() => setType(opt.k)}
                    style={{
                      padding:'8px 12px', borderRadius:7, fontSize:13, fontWeight:500,
                      background: type === opt.k ? '#fff' : 'transparent',
                      color: type === opt.k ? opt.color : 'var(--ink-4)',
                      boxShadow: type === opt.k ? 'var(--shadow-sm)' : 'none',
                      transition:'all 0.15s'
                    }}>
                    {opt.label}
                  </button>
                ))}
              </div>
            </div>

            <div>
              <Label>{t('modal.amount', lang)}</Label>
              <div style={{ position:'relative' }}>
                <span style={{
                  position:'absolute', left:14, top:'50%', transform:'translateY(-50%)',
                  fontSize:14, color:'var(--ink-4)', fontFamily:'JetBrains Mono', fontWeight:500
                }}>Rp</span>
                <input
                  type="text"
                  value={amount}
                  onChange={e => setAmount(e.target.value.replace(/[^\d]/g,''))}
                  placeholder="0"
                  autoFocus
                  style={{
                    width:'100%', padding:'12px 14px 12px 42px',
                    border:'1px solid var(--border)', borderRadius:9,
                    fontSize:18, fontWeight:600, color:'var(--ink)',
                    fontFamily:'JetBrains Mono', outline:'none', background:'#fff'
                  }}
                />
              </div>
              {amount && (
                <div className="mono fade-in" style={{ fontSize:12, color:'var(--ink-4)', marginTop:6 }}>
                  = {fmtIDR(parseInt(amount, 10), lang)}
                </div>
              )}
            </div>

            <div>
              <Label>{t('modal.desc', lang)}</Label>
              <input
                type="text"
                value={desc}
                onChange={e => setDesc(e.target.value)}
                placeholder={t('modal.descPh', lang)}
                style={{
                  width:'100%', padding:'10px 14px',
                  border:'1px solid var(--border)', borderRadius:9,
                  fontSize:14, color:'var(--ink)', outline:'none', background:'#fff'
                }}
              />
              <div style={{ fontSize:11, color:'var(--ink-4)', marginTop:6, display:'flex', alignItems:'center', gap:4 }}>
                <Icon name="spark" size={11} />
                {lang === 'id' ? 'AI akan otomatis memilih kategori dari deskripsi ini.' : 'AI will pick a category from this description.'}
              </div>
            </div>

            <div>
              <Label>{t('modal.date', lang)}</Label>
              <input
                type="date"
                value={date}
                onChange={e => setDate(e.target.value)}
                style={{
                  width:'100%', padding:'10px 14px',
                  border:'1px solid var(--border)', borderRadius:9,
                  fontSize:14, color:'var(--ink)', outline:'none', background:'#fff'
                }}
              />
            </div>
          </div>
          <div style={{ padding:'16px 24px 20px', display:'flex', gap:10, justifyContent:'flex-end', borderTop:'1px solid var(--border)' }}>
            <button onClick={onClose} style={{
              padding:'9px 16px', borderRadius:9, fontSize:13, fontWeight:500,
              color:'var(--ink-2)', border:'1px solid var(--border)', background:'#fff'
            }}>{t('modal.cancel', lang)}</button>
            <button onClick={submit} disabled={!canSave} style={{
              padding:'9px 18px', borderRadius:9, fontSize:13, fontWeight:500,
              color:'#fff', background: canSave ? 'var(--ink)' : 'var(--ink-5)',
              opacity: canSave ? 1 : 0.6, cursor: canSave ? 'pointer' : 'not-allowed',
              display:'inline-flex', alignItems:'center', gap:6
            }}>
              {t('modal.save', lang)} <Icon name="arrow" size={12} />
            </button>
          </div>
        </div>
      </div>
    </>
  );
}

function Label({ children }) {
  return (
    <div style={{ fontSize:11, fontWeight:500, color:'var(--ink-3)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:6 }}>
      {children}
    </div>
  );
}

/* ============================================================ */
/* TWEAKS PANEL                                                  */
/* ============================================================ */
function TweaksPanel({ open, onClose, tweaks, setTweak }) {
  if (!open) return null;
  const colors = ['#10b981', '#6366f1', '#f43f5e', '#f59e0b'];
  return (
    <div style={{
      position:'fixed', bottom:20, right:20, width:280, background:'#fff',
      border:'1px solid var(--border)', borderRadius:14, boxShadow:'var(--shadow-lg)',
      zIndex:1000, padding:16, fontSize:13
    }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
        <span style={{ fontWeight:600 }}>Tweaks</span>
        <button onClick={onClose} style={{ color:'var(--ink-4)', fontSize:18, lineHeight:1 }}>×</button>
      </div>
      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:11, fontWeight:500, color:'var(--ink-4)', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:8 }}>Language</div>
        <div style={{ display:'flex', gap:6 }}>
          {['id','en'].map(l => (
            <button key={l} onClick={() => setTweak('language', l)}
              style={{
                flex:1, padding:'8px 10px', borderRadius:8,
                border:'1px solid ' + (tweaks.language === l ? 'var(--ink)' : 'var(--border)'),
                background: tweaks.language === l ? 'var(--ink)' : '#fff',
                color: tweaks.language === l ? '#fff' : 'var(--ink)',
                fontSize:12, fontWeight:500
              }}>
              {l === 'id' ? 'Indonesia' : 'English'}
            </button>
          ))}
        </div>
      </div>
      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:11, fontWeight:500, color:'var(--ink-4)', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:8 }}>Accent</div>
        <div style={{ display:'flex', gap:8 }}>
          {colors.map(c => (
            <button key={c} onClick={() => setTweak('accent', c)}
              style={{
                width:36, height:36, borderRadius:10, background:c,
                border: tweaks.accent === c ? '2px solid var(--ink)' : '1px solid var(--border)',
                boxShadow: tweaks.accent === c ? '0 0 0 2px #fff inset' : 'none'
              }}/>
          ))}
        </div>
      </div>
      <div>
        <label style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:10, fontSize:12 }}>
          <span style={{ color:'var(--ink-2)' }}>Show anomaly alert</span>
          <button onClick={() => setTweak('showAnomaly', !tweaks.showAnomaly)}
            style={{
              width:36, height:20, borderRadius:10, padding:2,
              background: tweaks.showAnomaly ? 'var(--accent)' : 'var(--bg-muted)',
              transition:'background 0.15s', position:'relative'
            }}>
            <span style={{
              display:'block', width:16, height:16, background:'#fff', borderRadius:'50%',
              transform: tweaks.showAnomaly ? 'translateX(16px)' : 'translateX(0)',
              transition:'transform 0.15s'
            }}/>
          </button>
        </label>
      </div>
    </div>
  );
}

/* ============================================================ */
/* APP                                                           */
/* ============================================================ */
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [editOpen, setEditOpen] = useState(false);
  const [active, setActive] = useState('dashboard');
  const [monthIdx, setMonthIdx] = useState(4); // May
  const [year] = useState(2026);
  const [txns, setTxns] = useState(SEED_TXNS);
  const [modalOpen, setModalOpen] = useState(false);
  const [anomalyVisible, setAnomalyVisible] = useState(true);
  const [processingId, setProcessingId] = useState(null);

  useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accent);
    document.documentElement.style.setProperty('--accent-2', tweaks.accent);
  }, [tweaks.accent]);

  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const lang = tweaks.language;
  const setLang = (l) => setTweak('language', l);

  // Aggregates
  const income  = txns.filter(t => t.amt > 0).reduce((s,t) => s + t.amt, 0);
  const expense = -txns.filter(t => t.amt < 0).reduce((s,t) => s + t.amt, 0);
  const balance = income - expense;

  // Category breakdown for expenses
  const catTotals = {};
  txns.forEach(t => {
    if (t.amt < 0) catTotals[t.cat] = (catTotals[t.cat] || 0) + Math.abs(t.amt);
  });
  const cats = Object.entries(catTotals)
    .map(([key, val]) => ({ key, val }))
    .sort((a, b) => b.val - a.val);
  const catTotal = cats.reduce((s, c) => s + c.val, 0);

  const handleSave = ({ amount, desc, date }) => {
    setModalOpen(false);
    const id = Date.now();
    // Add as 'shopping' placeholder, then "AI categorizes" after 1.5s
    const guess = amount > 0 ? 'income' : 'shopping';
    const final = (() => {
      const d = desc.toLowerCase();
      if (/gojek|grab|bensin|busway|krl|mrt|ojek|taxi|fuel/.test(d)) return 'transport';
      if (/kopi|makan|food|lunch|dinner|breakfast|nasi|warteg|ayam|pizza|burger|coffee/.test(d)) return 'food';
      if (/netflix|spotify|bioskop|cinema|game|movie|hiburan/.test(d)) return 'entertainment';
      if (/indomaret|alfamart|tokopedia|shopee|belanja|baju|sepatu|shopping/.test(d)) return 'shopping';
      if (/listrik|air|pln|wifi|internet|tagihan|bill/.test(d)) return 'bills';
      if (/obat|apotek|dokter|rumah sakit|hospital|medicine|pharmacy/.test(d)) return 'health';
      if (/buku|kursus|book|course|tuition|sekolah/.test(d)) return 'education';
      if (/gaji|salary|bonus|freelance|income/.test(d)) return 'income';
      return guess;
    })();
    const newTxn = {
      id, date,
      desc: { id: desc, en: desc },
      cat: guess,
      amt: amount,
    };
    setTxns(prev => [newTxn, ...prev]);
    setProcessingId(id);
    setTimeout(() => {
      setTxns(prev => prev.map(t => t.id === id ? { ...t, cat: final } : t));
      setProcessingId(null);
    }, 1600);
  };

  return (
    <div style={{ display:'grid', gridTemplateColumns:'240px 1fr', minHeight:'100vh' }}>
      <Sidebar lang={lang} setLang={setLang} active={active} setActive={setActive} />
      <main style={{ minWidth:0 }}>
        <PageHeader
          lang={lang}
          monthIdx={monthIdx}
          year={year}
          setMonth={n => setMonthIdx(((n % 12) + 12) % 12)}
          onAdd={() => setModalOpen(true)}
        />
        <div style={{ padding:'24px 32px 40px', display:'flex', flexDirection:'column', gap:14 }}>
          {tweaks.showAnomaly && anomalyVisible && <AnomalyAlert lang={lang} onDismiss={() => setAnomalyVisible(false)} />}
          <MetricRow lang={lang} income={income} expense={expense} balance={balance} />
          <div style={{ display:'grid', gridTemplateColumns:'1.05fr 1.4fr', gap:14 }}>
            <DonutCard lang={lang} cats={cats} total={catTotal} />
            <TrendCard lang={lang} />
          </div>
          <InsightCard lang={lang} />
          <TransactionsList lang={lang} txns={txns} processingId={processingId} />
        </div>
      </main>
      <AddTxnModal lang={lang} open={modalOpen} onClose={() => setModalOpen(false)} onSave={handleSave} />
      <TweaksPanel
        open={editOpen}
        onClose={() => { setEditOpen(false); window.parent.postMessage({ type:'__edit_mode_dismissed' }, '*'); }}
        tweaks={tweaks}
        setTweak={setTweak}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
