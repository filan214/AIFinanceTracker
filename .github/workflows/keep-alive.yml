name: Keep Supabase alive

on:
  schedule:
    - cron: '0 9 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      # Accept either the bare names or the NEXT_PUBLIC_ ones the app uses,
      # so the ping works regardless of how the repo secrets were named.
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Verify secrets are present
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::SUPABASE_URL is empty. No matching repository secret found (checked SUPABASE_URL and NEXT_PUBLIC_SUPABASE_URL). Check the exact secret name under Settings > Secrets and variables > Actions, and that it is a repository secret (not an environment secret or a variable)."
            exit 1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_ANON_KEY is empty. No matching repository secret found (checked SUPABASE_ANON_KEY and NEXT_PUBLIC_SUPABASE_ANON_KEY)."
            exit 1
          fi
          echo "Both secrets resolved."
      - name: Ping Supabase REST API
        run: |
          curl -f \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/user_profiles?select=id&limit=1"
